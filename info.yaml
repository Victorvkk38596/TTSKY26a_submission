# Tiny Tapeout project information
project:
  title:        "Sierpinski Nebula Flight"      # Project title
  author:       "Vasudev"                    # Your name
  discord:      ""                             # Your discord username (optional)
  description:  "A thematic space nebula demoscene with VGA output and PWM audio." 
  language:     "Verilog" 
  clock_hz:     25175000                       # Standard VGA clock frequency

  # This design is optimized for a single tile.
  tiles: "1x1"          

  # This must match the 'module' name in your project.v exactly
  top_module:  "tt_um_example"

  source_files:
    - "project.v"

# The pinout for the datasheet. Descriptive names help people use your chip!
pinout:
  # Inputs (ui_in)
  ui[0]: "Speed bit 0"
  ui[1]: "Speed bit 1"
  ui[2]: "Speed bit 2"
  ui[3]: "Speed bit 3"
  ui[4]: "Density bit 0"
  ui[5]: "Density bit 1"
  ui[6]: "Density bit 2"
  ui[7]: "Density bit 3"

  # Outputs (uo_out) - Standard Tiny Tapeout VGA PMOD mapping
  uo[0]: "Red 0 (LSB)"
  uo[1]: "Green 0 (LSB)"
  uo[2]: "Blue 0 (LSB)"
  uo[3]: "HSync (Active Low)"
  uo[4]: "Red 1 (MSB)"
  uo[5]: "Green 1 (MSB)"
  uo[6]: "Blue 1 (MSB)"
  uo[7]: "VSync (Active Low)"

  # Bidirectional pins (uio_out)
  uio[0]: "PWM Audio Output"
  uio[1]: "unused"
  uio[2]: "unused"
  uio[3]: "unused"
  uio[4]: "unused"
  uio[5]: "unused"
  uio[6]: "unused"
  uio[7]: "unused"

# Do not change!
yaml_version: 6
